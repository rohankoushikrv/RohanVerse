    <style>
        /* Modern CSS Design Tokens & Variable Architecture */
        :root {
            --zomato-red: #EF4F5F;
            --swiggy-orange: #FC8019;
            --brand-green: #25C55E;
            --text-main: #1C1C1C;
            --text-muted: #696969;
            --bg-light: #F8F8F8;
            --border-line: #E8E8E8;
            --shadow-sm: 0 2px 8px rgba(28, 28, 28, 0.08);
            --shadow-md: 0 4px 18px rgba(28, 28, 28, 0.12);
            --font-primary: 'Okra', 'Poppins', sans-serif;
        }

        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-primary);
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #FFFFFF;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Zomato/Swiggy Sticky Sticky Navbar Header */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #FFFFFF;
            border-bottom: 1px solid var(--border-line);
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }

        .nav-container {
            max-w: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
        }

        .brand-logo span {
            color: var(--zomato-red);
        }

        .campus-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(239, 79, 95, 0.08);
            color: var(--zomato-red);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(239, 79, 95, 0.15);
        }

        /* Swiggy-Style Breadcrumb & Tab Row Filters */
        .filter-section {
            max-width: 1200px;
            margin: 24px auto 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }

        .filter-pill {
            background: #FFFFFF;
            border: 1px solid var(--border-line);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-pill:hover {
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        .filter-pill.active {
            background-color: rgba(239, 79, 95, 0.06);
            border-color: var(--zomato-red);
            color: var(--zomato-red);
            font-weight: 600;
        }

        /* Zomato Food Item Grid System Layout */
        .menu-grid-section {
            max-width: 1200px;
            margin: 32px auto 64px auto;
            padding: 0 24px;
        }

        .section-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 24px;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
        }

        /* Individual Premium Food Card Layout */
        .food-card {
            background: #FFFFFF;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.215, 0.610, 0.355, 1);
            border: 1px solid transparent;
            cursor: pointer;
            position: relative;
        }

        .food-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-line);
            transform: translateY(-4px);
        }

        .image-frame {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFF0F2 100%);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            overflow: hidden;
            border: 1px solid var(--border-line);
        }

        .tag-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(28, 28, 28, 0.85);
            backdrop-blur: 4px;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .veg-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 18px;
            height: 18px;
            border: 2px solid var(--brand-green);
            background: #FFFFFF;
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .veg-dot {
            width: 8px;
            height: 8px;
            background: var(--brand-green);
            border-radius: 50%;
        }

        .card-details {
            padding: 14px 4px 4px 4px;
        }

        .meta-row-one {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .food-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .food-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .meta-row-two {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            border-bottom: 1px dashed var(--border-line);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .delivery-time {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: var(--bg-light);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .hygiene-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .hygiene-strip i {
            color: #5086EC;
        }

        /* Swiggy Style Dashboard Interactive Checkout Block */
        .calculator-wrapper {
            background-color: var(--bg-light);
            border-top: 1px solid var(--border-line);
            padding: 64px 24px;
        }

        .calc-container {
            max-w: 900px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-line);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .calc-container {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .calc-form-side {
            padding: 40px;
        }

        .calc-bill-side {
            background-color: #FAFAFA;
            border-left: 1px solid var(--border-line);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .form-heading {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .custom-select {
            width: 100%;
            height: 48px;
            background: #FFFFFF;
            border: 1px solid var(--border-line);
            border-radius: 10px;
            padding: 0 16px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
            appearance: none;

background-image: url("data:image/svg+xml;utf8,");
background-repeat: no-repeat;
background-position: right 16px center;
background-size: 16px;
}
.custom-select:focus {
border-color: var(--zomato-red);
}
/* Order Summary Bill Receipt Micro-design */
.bill-title {
font-size: 14px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1px;
color: var(--text-muted);
margin-bottom: 20px;
}
.bill-row {
display: flex;
justify-content: space-between;
font-size: 14px;
color: var(--text-muted);
margin-bottom: 12px;
}
.bill-total-row {
display: flex;
justify-content: space-between;
font-size: 20px;
font-weight: 700;
color: var(--text-main);
border-top: 1px dashed var(--border-line);
padding-top: 16px;
margin-top: 16px;
}
.zomato-btn {
background-color: var(--zomato-red);
color: #FFFFFF;
border: none;
width: 100%;
height: 52px;
border-radius: 12px;
font-size: 16px;
font-weight: 600;
cursor: pointer;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
transition: background-color 0.2s ease;
margin-top: 24px;
box-shadow: 0 4px 14px rgba(239, 79, 95, 0.25);
}
.zomato-btn:hover {
background-color: #DF3F4F;
}
/* App Footer Elements */
.app-footer {
background-color: var(--text-main);
color: #FFFFFF;
padding: 40px 24px;
text-align: center;
font-size: 13px;
}
.footer-brand {
font-size: 20px;
font-weight: 800;
margin-bottom: 8px;
}
.footer-compliance {
color: #A0A0A0;
font-family: monospace;
font-size: 11px;
margin-top: 12px;
}

// Update active state on pill markers
const pills = document.querySelectorAll('.filter-pill');
pills.forEach(pill => pill.classList.remove('active'));
event.currentTarget.classList.add('active');
// Hide/Show elements inside the card layout array grid
const cards = document.querySelectorAll('.food-card');
cards.forEach(card => {
if (category === 'all' || card.getAttribute('data-category') === category) {
card.style.display = 'block';
} else {
card.style.display = 'none';
}
});
}
// Functional Pricing Calculator Invoice Logic
function runBillEngine() {
const currentDailyPrice = parseInt(document.getElementById('boxSelect').value);
const selectedDaysCount = parseInt(document.getElementById('daysSelect').value);
// Compute operational variables
const grossWeeklyTotal = currentDailyPrice * selectedDaysCount;
// Render outputs straight into structural components
document.getElementById('rateLabel').innerText = currentDailyPrice;
document.getElementById('totalLabel').innerText = grossWeeklyTotal;
}
